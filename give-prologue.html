<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="GIVE ID 자가점검을 시작하기 전 관계의 돌봄, 경계, 회복 신호를 직접 발견하는 인터랙티브 프롤로그입니다.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://hogoo-challenge.pages.dev/give-test.html">
  <title>GIVE ID · 관계의 실을 따라가기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-lab.css">
</head>
<body>
  <main class="world" id="world" data-thread-stage data-next-url="/give-test.html?start=1" aria-labelledby="worldTitle">
    <header class="world-header">
      <a href="/give-test.html" class="world-brand">GIVE ID <span>Pattern Lab</span></a>
      <p aria-hidden="true">INTERACTIVE PROLOGUE · 01</p>
      <a class="world-skip" href="/give-test.html?start=1">바로 시작</a>
    </header>

    <div class="world-art" aria-hidden="true">
      <img class="world-layer world-layer-base" src="/images/design-lab/give-prologue-world-v1.webp" alt="" fetchpriority="high" draggable="false">
      <img class="world-layer world-layer-subject" src="/images/design-lab/give-prologue-world-v1.webp" alt="" draggable="false">
      <img class="world-layer world-layer-foreground" src="/images/design-lab/give-prologue-world-v1.webp" alt="" draggable="false">
      <span class="portal-light"></span>
    </div>

    <svg class="living-thread" id="livingThread" viewBox="0 0 1600 1000" preserveAspectRatio="none" aria-hidden="true">
      <path class="thread-shadow" d="M-20 690 C260 720 470 660 650 635 C820 610 895 690 1030 610 C1135 548 1190 492 1320 470 C1435 452 1500 415 1620 365" pathLength="100" />
      <path class="thread-path" id="threadPath" d="M-20 690 C260 720 470 660 650 635 C820 610 895 690 1030 610 C1135 548 1190 492 1320 470 C1435 452 1500 415 1620 365" pathLength="100" />
      <circle class="thread-orb" id="threadOrb" cx="-20" cy="690" r="12" />
    </svg>

    <section class="world-copy">
      <p class="world-kicker"><span>01</span> 마음의 실을 따라가기</p>
      <h1 id="worldTitle"><span>늘 먼저 챙긴</span><span>그 마음을,</span><em>이번엔 따라가요.</em></h1>
      <p class="world-description">이 테스트는 얼마나 착한지를 재지 않습니다.<br><b>돌봄·경계·회복</b>이 관계에서 작동하는 방식을 읽습니다.</p>
    </section>

    <ol class="signal-notes" aria-live="polite" aria-label="관계에서 발견한 신호">
      <li data-threshold=".28"><span>CARE</span><strong>먼저 챙긴 마음</strong></li>
      <li data-threshold=".50"><span>LINE</span><strong>늦게 도착한 경계</strong></li>
      <li data-threshold=".72"><span>RECOVER</span><strong>다시 나에게 오는 길</strong></li>
    </ol>

    <p class="drag-hint" id="dragHint"><b>왼쪽의 민트빛 실을 잡고,</b> 오른쪽 문을 향해 천천히 당겨 보세요 <span aria-hidden="true">→</span></p>

    <nav class="page-rail" aria-label="프롤로그 진행">
      <button class="rail-button rail-prev" type="button" disabled aria-label="이전 단계">←</button>
      <div class="rail-progress">
        <ol class="rail-stages" aria-label="프롤로그 네 단계">
          <li data-stage="0" class="is-current"><b>01</b><span>실 잡기</span></li>
          <li data-stage=".18"><b>02</b><span>돌봄</span></li>
          <li data-stage=".46"><b>03</b><span>경계</span></li>
          <li data-stage=".72"><b>04</b><span>회복</span></li>
        </ol>
        <label for="threadRange" class="sr-only">프롤로그 장면 진행도</label>
        <input id="threadRange" type="range" min="0" max="100" value="0">
      </div>
      <button class="rail-button rail-next" id="railNext" type="button">
        <span>실을 따라가기</span><b aria-hidden="true">→</b>
      </button>
    </nav>
  </main>
  <script src="/design-lab.js"></script>
</body>
</html>
