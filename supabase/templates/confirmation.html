<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>이메일 인증</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:10px;overflow:hidden;border:1px solid #e4e4e4;">
          <tr>
            <td style="background:#00896c;padding:24px 32px;">
              <p style="margin:0;font-size:16px;font-weight:900;color:#e8f7f3;letter-spacing:0.03em;">GIVE ECO SYSTEM</p>
              <p style="margin:4px 0 0;font-size:10px;color:rgba(232,247,243,0.65);">관계의 새로운 기준</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 32px 24px;">
              <h1 style="margin:0 0 12px;font-size:20px;font-weight:800;color:#1d1d1f;">드디어 시작이네요! 🌱</h1>
              <p style="margin:0 0 28px;font-size:14px;color:#5a5a62;line-height:1.8;">
                안녕하세요!<br>
                호구 탈출 챌린지의 첫 걸음을 내딛으셨군요.<br>
                아래 버튼을 눌러 이메일을 확인하면, 바로 시작할 수 있어요.
              </p>
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:#00896c;border-radius:8px;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 28px;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;">이메일 인증하기</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;">
              <p style="margin:0;padding-top:16px;border-top:1px solid #f0f0f0;font-size:11px;color:#bbbbbb;line-height:1.65;">
                링크는 24시간 유효합니다.<br>
                이 메일을 요청하지 않으셨나요? 무시하셔도 됩니다.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
