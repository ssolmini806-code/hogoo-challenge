<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>거절력 테스트 | GIVE Ecosystem</title>
    <meta name="description" content="부탁 앞에서 내 경계가 얼마나 잘 지켜지는지 확인하는 무료 거절력 테스트.">
    <link rel="canonical" href="https://hogoo-challenge.pages.dev/refusal-test.html">
    <meta property="og:title" content="거절력 테스트 | GIVE Ecosystem">
    <meta property="og:description" content="부탁 앞에서 무너지는 순간을 10문항으로 확인하세요.">
    <meta property="og:image" content="https://hogoo-challenge.pages.dev/og-image.jpg">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;word-break:keep-all}
        body{font-family:Pretendard,-apple-system,system-ui,sans-serif;background:#f7f8fa;color:#17191c;line-height:1.6}
        .inner{width:min(100%,500px);margin:0 auto;padding:0 20px}.hidden{display:none!important}
        .page{padding:58px 0 80px}.badge{display:inline-block;background:#eaf8f5;color:#007a62;border-radius:999px;padding:7px 13px;font-size:.78rem;font-weight:900;margin-bottom:18px}
        h1{font-size:2.2rem;line-height:1.12;font-weight:950;margin-bottom:12px}p{color:#606873;font-weight:650}.meta{font-size:.82rem;color:#929aa5;margin:10px 0 30px}
        button,a.btn{width:100%;min-height:56px;border:0;border-radius:8px;background:#00a885;color:#fff;font-family:inherit;font-size:1rem;font-weight:900;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer}
        .progress{height:8px;background:#e7e9ee;border-radius:99px;overflow:hidden;margin-bottom:28px}.fill{height:100%;width:0;background:#00a885;transition:.25s}
        .q{font-size:1.28rem;line-height:1.38;font-weight:950;margin-bottom:22px}.answers{display:grid;gap:10px}.ans{background:#fff;color:#17191c;border:2px solid #e7e9ee;text-align:left;justify-content:flex-start;padding:15px 16px;min-height:62px}
        .card{background:#fff;border:1px solid #e7e9ee;border-radius:8px;padding:20px;margin:18px 0;box-shadow:0 12px 28px rgba(24,31,43,.07)}.grid{display:grid;gap:10px;margin-top:18px}
        .rel{display:block;background:#fff;border:1px solid #e7e9ee;border-radius:8px;padding:15px;text-decoration:none;color:#17191c;font-weight:900}.rel span{display:block;color:#6a7078;font-size:.82rem;font-weight:700;margin-top:2px}
        .ad{min-height:100px;border:1px dashed #bac1cb;background:#f2f4f7;color:#8b94a1;border-radius:8px;display:grid;place-items:center;text-align:center;font-size:.76rem;font-weight:800;margin:18px 0}
    </style>
</head>
<body>
<main>
    <section id="intro" class="page">
        <div class="inner">
            <span class="badge">무료 심리 테스트</span>
            <h1>거절력 테스트</h1>
            <p>부탁 앞에서 내 기준을 지키는 힘이 어느 정도인지 확인하세요.</p>
            <p class="meta">10문항 · 약 2분 · 결과 즉시 확인</p>
            <button onclick="start()">지금 진단하기</button>
            <div class="ad">AD · intro banner slot</div>
        </div>
    </section>
    <section id="test" class="page hidden">
        <div class="inner">
            <div class="progress"><div class="fill" id="fill"></div></div>
            <h2 class="q" id="q"></h2>
            <div class="answers" id="answers"></div>
        </div>
    </section>
    <section id="result" class="page hidden">
        <div class="inner">
            <div class="ad">AD · top result slot</div>
            <div class="card">
                <span class="badge">나의 거절력</span>
                <h1 id="name"></h1>
                <p id="body"></p>
            </div>
            <a class="btn" href="articles/setting-boundaries.html">거절 문장 자세히 보기</a>
            <div class="ad">AD · related tests slot</div>
            <div class="grid">
                <a class="rel" href="give-test.html">GIVE ID 테스트<span>나의 관계 성향 확인</span></a>
                <a class="rel" href="hogoo-check.html">나는 호구일까?<span>손해 보는 패턴 확인</span></a>
                <a class="rel" href="relationship-risk.html">인간관계 위험도 테스트<span>소진되는 관계 점검</span></a>
            </div>
        </div>
    </section>
</main>
<script>
const qs=[
["급한 부탁을 받으면?",["바로 한다","고민하다 한다","가능 범위를 말한다","어렵다고 말한다"]],
["거절 후 죄책감은?",["매우 크다","조금 있다","금방 사라진다","거의 없다"]],
["반복 부탁이 오면?",["계속 해준다","피한다","한번 말한다","선을 긋는다"]],
["상대가 실망한 표정을 지으면?",["번복한다","흔들린다","설명한다","결정을 유지한다"]],
["내 일정이 있는데 부탁이 오면?",["내 일정을 미룬다","가능하면 미룬다","시간을 조정한다","내 일정을 지킨다"]],
["'너밖에 없어'를 들으면?",["감동해서 한다","부담돼도 한다","상황을 묻는다","책임을 분리한다"]],
["거절 문장을 말할 때?",["말이 안 나온다","돌려 말한다","짧게 말한다","명확히 말한다"]],
["거절하고 관계가 멀어질까 걱정되나?",["항상 그렇다","자주 그렇다","가끔 그렇다","거의 없다"]],
["도움의 범위를 정하나?",["정하지 않는다","마음속으로만 정한다","가끔 말한다","처음부터 말한다"]],
["내 거절은 나를 지키는 행동이라고 느끼나?",["전혀 아니다","잘 모르겠다","어느 정도 그렇다","그렇다"]]
];
const rs=[
{limit:17,name:"거절 초보형",body:"부탁 앞에서 내 기준보다 상대 감정을 먼저 봅니다. 작은 거절 문장부터 연습해야 합니다."},
{limit:25,name:"흔들리는 배려형",body:"거절할 수는 있지만 죄책감에 자주 흔들립니다. 답변을 미루는 기술이 도움이 됩니다."},
{limit:33,name:"기준 성장형",body:"대부분의 상황에서 선을 지킬 수 있습니다. 반복 부탁에 대한 고정 문장을 준비해보세요."},
{limit:99,name:"단단한 경계형",body:"거절력이 좋은 편입니다. 차갑게 보이지 않도록 짧은 이유와 대안을 더하면 좋습니다."}
];
let i=0,s=0;
function start(){i=0;s=0;intro.classList.add("hidden");result.classList.add("hidden");test.classList.remove("hidden");render()}
function render(){fill.style.width=Math.round(i/qs.length*100)+"%";q.textContent=qs[i][0];answers.innerHTML="";qs[i][1].forEach((a,idx)=>{const b=document.createElement("button");b.className="ans";b.textContent=a;b.onclick=()=>pick(idx+1);answers.appendChild(b)})}
function pick(v){s+=v;i++;if(i<qs.length)render();else show()}
function show(){test.classList.add("hidden");result.classList.remove("hidden");const r=rs.find(x=>s<=x.limit);name.textContent=r.name;body.textContent=r.body;scrollTo(0,0)}
</script>
</body>
</html>
