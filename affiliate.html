    <style>
        :root {
            --primary: #00a885;
            --primary-hover: #008f72;
            --primary-soft: #f0f9f7;
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --bg: #ffffff;
            --white: #ffffff;
            --border: #f2f2f2;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; }

        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        
        nav { padding: 24px 0; text-align: center; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: -0.05em; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: var(--text-sub); font-size: 0.9rem; font-weight: 500; }
        .nav-links a:hover { color: var(--primary); }

        .form-header { padding: 60px 0 40px; text-align: center; }
        .form-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 16px; color: var(--text-main); letter-spacing: -0.03em; }
        .form-header p { font-size: 1.1rem; color: var(--text-sub); }

        .form-container { 
            background: var(--white); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 40px; 
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .form-group input, 
        .form-group textarea { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            font-size: 1rem; 
            font-family: inherit;
            transition: var(--transition);
            background: #fafafa;
        }
        .form-group input:focus, 
        .form-group textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 168, 133, 0.1);
        }

        .submit-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: var(--white); 
            border: none; 
            border-radius: 14px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: var(--transition);
            margin-top: 10px;
        }
        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 168, 133, 0.2); }
        .submit-btn:active { transform: translateY(0); }

        footer { padding: 60px 0 40px; text-align: center; border-top: 1px solid var(--border); font-size: 0.85rem; color: #999; }
        .footer-links { margin-bottom: 20px; display: flex; justify-content: center; gap: 20px; }
        .footer-links a { text-decoration: none; color: #666; }
        .footer-links a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .form-container { padding: 24px; border-radius: 20px; }
            .form-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="index.html" class="logo">GIVE ECOSYSTEM</a>
            <div class="nav-links">
                <a href="about.html">소개</a>
                <a href="give-test.html">진단</a>
            </div>
        </nav>

        <section class="form-header">
            <h1>제휴 및 협업 문의</h1>
            <p>기버(Giver)들을 위한 더 나은 세상을<br>함께 만들어갈 파트너를 기다립니다.</p>
        </section>

        <div class="form-container">
            <form action="https://formspree.io/f/xgorqeoo" method="POST">
                <div class="form-group">
                    <label for="name">이름 / 기업명</label>
                    <input type="text" id="name" name="name" placeholder="홍길동 또는 (주)기브" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="contact@example.com" required>
                </div>

                <div class="form-group">
                    <label for="website">웹사이트 / SNS (선택)</label>
                    <input type="url" id="website" name="website" placeholder="https://">
                </div>

                <div class="form-group">
                    <label for="message">제휴 제안 내용</label>
                    <textarea id="message" name="message" rows="6" placeholder="협업하고 싶은 구체적인 내용을 적어주세요." required></textarea>
                </div>

                <!-- Formspree settings -->
                <input type="hidden" name="_subject" value="GIVE Ecosystem 제휴 신청">
                
                <button type="submit" class="submit-btn">제안 보내기</button>
            </form>
        </div>

        <footer>
            <div class="footer-links">
                <a href="index.html">홈으로</a>
                <a href="about.html">브랜드 스토리</a>
                <a href="articles/giver-burnout.html">심리 칼럼</a>
                <a href="terms.html">이용약관</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="affiliate.html">제휴 문의</a>
            </div>
            <p>&copy; 2026 GIVE Ecosystem. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
