<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIVE Ecosystem | 나를 알고 관계를 디자인하다</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #00a885;
            --bg-gray: #f2f2f7;
            --text-black: #1a1a1a;
            --text-gray: #666666;
            --white: #ffffff;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
        body { font-family: 'Pretendard', sans-serif; background: var(--white); color: var(--text-black); -webkit-font-smoothing: antialiased; }

        /* Header (Qshop Style) */
        header {
            position: sticky; top: 0; height: 60px; background: var(--white);
            display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid #f0f0f0; z-index: 1000;
        }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-black); text-decoration: none; }

        /* Hero Banner (Qshop Main Banner) */
        .hero-banner {
            position: relative; width: 100%; height: 500px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&q=80&w=2000') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--white); text-align: center; padding: 0 20px;
        }
        .hero-banner h1 { font-size: 2.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .hero-banner p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }
        .btn-main { background: var(--primary); color: var(--white); padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; }

        /* Icon Menu (Quick Links) */
        .icon-nav {
            display: flex; justify-content: center; gap: 30px; padding: 40px 20px;
            overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none;
        }
        .icon-nav::-webkit-scrollbar { display: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; min-width: 70px; }
        .icon-circle {
            width: 60px; height: 60px; border-radius: 50%; background: var(--bg-gray);
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
            margin-bottom: 10px; transition: 0.3s;
        }
        .nav-item:hover .icon-circle { background: var(--primary); color: white; transform: translateY(-5px); }
        .nav-item span { font-size: 0.85rem; font-weight: 600; color: var(--text-black); }

        /* Product Section (The Core Skeleton) */
        .section-wrap { padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
        .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .section-title a { font-size: 0.85rem; color: var(--text-gray); text-decoration: none; }

        .item-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .item-grid { grid-template-columns: 1fr 1fr; } }

        .item-card {
            background: var(--white); border-radius: var(--radius); overflow: hidden;
            text-decoration: none; color: inherit; border: 1px solid #f0f0f0;
            transition: 0.3s;
        }
        .item-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .item-img { width: 100%; height: 200px; background: var(--bg-gray); display: flex; justify-content: center; align-items: center; font-size: 3rem; }
        .item-info { padding: 20px; }
        .item-tag { font-size: 0.75rem; color: var(--primary); font-weight: 700; margin-bottom: 5px; display: block; }
        .item-name { font-size: 1.15rem; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
        .item-price { font-size: 1.1rem; font-weight: 700; color: var(--text-black); }
        .item-price span { font-size: 0.85rem; color: var(--text-gray); text-decoration: line-through; margin-right: 5px; font-weight: 400; }

        /* Content Banner (Long Image/Text Section) */
        .content-banner {
            width: 100%; background: #000; color: white; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            margin: 40px 0;
        }
        .content-banner h2 { font-size: 1.8rem; margin-bottom: 15px; }
        .content-banner p { font-size: 1rem; opacity: 0.8; max-width: 600px; margin-bottom: 30px; }

        /* Footer */
        <footer>
            <div class="footer-content">
                <div class="f-info">
                    <h3>GIVE Ecosystem (기버 생태계 연구소)</h3>
                    <p>
                        대표: ssolmini806 | 사업자번호: 준비중<br>
                        주소: 대한민국 어딘가 | 이메일: ssolmini806@gmail.com<br>
                        고객센터: 010-0000-0000 (평일 10:00 - 18:00)
                    </p>
                </div>
                <div class="f-sns">
                    <div style="width: 36px; height: 36px; background: #eee; border-radius: 50%;"></div>
                    <div style="width: 36px; height: 36px; background: #eee; border-radius: 50%;"></div>
                    <div style="width: 36px; height: 36px; background: #eee; border-radius: 50%;"></div>
                </div>
                <p style="font-size: 0.8rem; color: #ccc;">&copy; 2026 GIVE Ecosystem. All rights reserved.</p>
            </div>
        </footer>

</body>
</html>
