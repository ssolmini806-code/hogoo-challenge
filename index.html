<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIVE Ecosystem | 서비스 선택</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #00a885;
            --primary-light: #e6f6f3;
            --text-dark: #1d1d1f;
            --text-gray: #6e6e73;
            --bg: #f9fbfb;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 40px;
            display: block;
            text-decoration: none;
            letter-spacing: -0.05em;
        }

        .choice-grid {
            display: grid;
            gap: 20px;
        }

        .choice-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 32px;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .choice-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 168, 133, 0.1);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 1rem;
            color: var(--text-gray);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--primary-light);
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .choice-card:hover .btn {
            background: var(--primary);
            color: white;
        }

        footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="logo">GIVE ECOSYSTEM</a>

        <div class="choice-grid">
            <!-- 1. GIVE ID Test -->
            <a href="give-test.html" class="choice-card">
                <div class="icon">🤝</div>
                <h2 class="title">GIVE ID 진단</h2>
                <p class="desc">나의 기버 성향과<br>관계의 경계를 확인해보세요</p>
                <div class="btn">지금 시작하기</div>
            </a>

            <!-- 2. 7-Day Challenge -->
            <a href="hogoo-test.html" class="choice-card">
                <div class="icon">🔥</div>
                <h2 class="title">7일 챌린지</h2>
                <p class="desc">나를 지키는 선의를 위해<br>7일간 직접 실천해보세요</p>
                <div class="btn">참여하기</div>
            </a>
        </div>

        <footer>
            &copy; 2026 GIVE Ecosystem. All rights reserved.
        </footer>
    </div>

</body>
</html>
