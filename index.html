<script>
(function () {
  window.dataLayer = window.dataLayer || [];
  window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };
  window.trackEvent = window.trackEvent || function (name, params) {
    if (typeof window.gtag === 'function') window.gtag('event', name, params || {});
  };

  function loadScript(src, attrs, onload) {
    var script = document.createElement('script');
    script.src = src;
    script.async = true;
    Object.keys(attrs || {}).forEach(function (key) { script.setAttribute(key, attrs[key]); });
    if (onload) script.addEventListener('load', onload, { once: true });
    document.head.appendChild(script);
  }

  function afterInteractionOrDelay(callback, delay) {
    var done = false;
    var events = ['pointerdown', 'keydown', 'touchstart', 'scroll'];
    function run() {
      if (done) return;
      done = true;
      events.forEach(function (eventName) { window.removeEventListener(eventName, run); });
      callback();
    }
    events.forEach(function (eventName) { window.addEventListener(eventName, run, { once: true, passive: true }); });
    window.setTimeout(run, delay);
  }

  afterInteractionOrDelay(function () {
    loadScript('/site-bootstrap.js', { 'data-third-party': 'ga,ads,clarity,userback,addToAny' }, function () {
      loadScript('/third-party-loader.js');
    });
  }, 45000);

  afterInteractionOrDelay(function () {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = '/give-theme.css';
    document.head.appendChild(link);
  }, 8000);

  titleMascots();
  titleMenu();

  function titleMenu() {
    var menu = document.querySelector('.ts-menu');
    var caret = menu && menu.querySelector('.ts-caret');
    var items = menu ? Array.prototype.slice.call(menu.querySelectorAll('.ts-item')) : [];
    var mascotHost = document.querySelector('.ts-bg');
    if (!menu || !caret || !items.length) return;

    var hoveredItem = null;
    var focusedItem = null;
    var isTouchMenu = window.matchMedia && window.matchMedia('(hover: none)').matches;

    function moveCaret(item) {
      caret.style.transform = 'translateY(' + item.offsetTop + 'px)';
    }

    function highlightMascot(item) {
      if (!mascotHost) return;
      var activeClass = item && item.getAttribute('data-mascot');
      mascotHost.classList.toggle('has-active-mascot', Boolean(activeClass));
      mascotHost.querySelectorAll('.ts-mascot').forEach(function (mascot) {
        mascot.classList.toggle('is-active', Boolean(activeClass) && mascot.classList.contains(activeClass));
      });
    }

    function syncSelection() {
      var item = hoveredItem || focusedItem || items[0];
      moveCaret(item);
      highlightMascot(hoveredItem || focusedItem);
    }

    items.forEach(function (item) {
      item.addEventListener('mouseenter', function () {
        hoveredItem = item;
        syncSelection();
      });
      item.addEventListener('mouseleave', function () {
        hoveredItem = null;
        syncSelection();
      });
      item.addEventListener('focus', function () {
        focusedItem = item;
        syncSelection();
      });
      item.addEventListener('blur', function () {
        focusedItem = null;
        syncSelection();
      });
      item.addEventListener('click', function (event) {
        if (!isTouchMenu || event.defaultPrevented) return;
        event.preventDefault();
        hoveredItem = item;
        syncSelection();
        window.setTimeout(function () { window.location.href = item.href; }, 200);
      });
    });

    moveCaret(items[0]);
    window.addEventListener('resize', syncSelection, { passive: true });
  }

  function titleMascots() {
    var host = document.querySelector('.ts-bg');
    if (!host) return;
    var mascots = [
      ['m1', 'type-angel'],      // 다 퍼주는 강아지
      ['m2', 'type-diplomat'],   // 눈치 보는 고양이
      ['m3', 'type-awakening'],  // 야무진 여우
      ['m4', 'type-gatekeeper'], // 현명한 올빼미
      ['m5', 'type-hamster'],    // 방전된 햄스터
      ['m6', 'type-hedgehog'],   // 철벽 고슴도치
      ['m7', 'type-balancer']    // 영리한 너구리
    ];
    // 모바일에서는 가독성/전송량을 위해 모서리 4개만 로드
    var small = window.matchMedia && window.matchMedia('(max-width: 640px)').matches;
    var visible = small ? ['m1', 'm4', 'm5', 'm6'] : null;
    mascots.forEach(function (mascot) {
      if (visible && visible.indexOf(mascot[0]) === -1) return;
      var img = document.createElement('img');
      img.className = 'ts-mascot ' + mascot[0];
      img.alt = '';
      img.decoding = 'async';
      img.setAttribute('fetchpriority', 'low');
      img.addEventListener('load', function () { img.classList.add('on'); }, { once: true });
      img.src = '/images/types/give-id/' + mascot[1] + '.webp';
      host.appendChild(img);
    });
  }

})();
</script>
