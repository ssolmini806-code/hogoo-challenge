<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7일 챌린지 완주 · GIVE Ecosystem</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,1,400;9..144,1,500;9..144,0,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet" href="/give-theme.css">
<script src="/give-progress.js"></script>
<style>
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;}

/* top bar */
.topbar{width:100%;border-bottom:1px solid var(--line);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;max-width:560px;margin:0 auto;}
.topbar-logo{font-family:var(--serif);font-style:italic;font-size:1rem;color:var(--green);text-decoration:none;}
.topbar-home{font-size:.85rem;font-weight:600;color:var(--ink-sub);text-decoration:none;}
.topbar-home:hover{color:var(--green);}

/* main */
.page{width:100%;max-width:420px;padding:0 22px 64px;margin:0 auto;}

/* hero badge */
.badge-wrap{text-align:center;padding:48px 0 36px;position:relative;}
.badge-ring{width:120px;height:120px;margin:0 auto 20px;position:relative;}
.badge-ring svg{width:100%;height:100%;}
.badge-inner{position:absolute;inset:10px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.badge-num{font-family:var(--serif);font-size:2rem;font-weight:700;color:#fff;line-height:1;}
.badge-unit{font-size:.65rem;font-weight:700;color:#A9D8C8;letter-spacing:.06em;margin-top:3px;}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:50%;}

.badge-label{font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--mint-ink);margin-bottom:10px;}
.badge-title{font-size:clamp(1.6rem,7vw,2.2rem);font-weight:800;line-height:1.22;letter-spacing:-.02em;color:var(--ink);margin-bottom:10px;text-wrap:balance;}
.badge-sub{font-size:.97rem;color:var(--ink-sub);line-height:1.72;max-width:22em;margin:0 auto;}

/* stat row */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:28px 0;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center;}
.stat .num{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--green);}
.stat .lbl{font-size:.72rem;color:var(--ink-faint);margin-top:3px;}

/* share card */
.share-card{background:var(--green);border-radius:22px;padding:26px 22px;margin-bottom:16px;text-align:center;}
.share-card .sc-eyebrow{font-family:var(--serif);font-style:italic;font-size:.88rem;color:#A9D8C8;margin-bottom:10px;display:block;}
.share-card h2{font-size:1.18rem;font-weight:800;color:#fff;line-height:1.35;margin-bottom:8px;}
.share-card p{font-size:.88rem;color:#D7E8E1;line-height:1.65;margin-bottom:20px;}
.share-btns{display:grid;gap:10px;}
.btn-threads{min-height:52px;border-radius:12px;background:#fff;color:var(--green);font-family:inherit;font-size:.98rem;font-weight:800;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .18s;}
.btn-threads:hover{background:#F0FBF8;}
.btn-threads img{width:22px;height:22px;}
.btn-share-more{min-height:46px;border-radius:12px;background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:.9rem;font-weight:700;border:1px solid rgba(255,255,255,.22);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .18s;}
.btn-share-more:hover{background:rgba(255,255,255,.2);}

/* next actions */
.next-title{font-size:1rem;font-weight:800;margin-bottom:12px;color:var(--ink);}
.next-grid{display:grid;gap:10px;}
.next-card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid var(--line);border-radius:14px;text-decoration:none;color:inherit;transition:border-color .2s;}
.next-card:hover{border-color:var(--mint);}
.next-card .itile{flex-shrink:0;}
.next-card .nc-text{flex:1;}
.next-card .nc-title{font-size:1rem;font-weight:700;display:block;margin-bottom:3px;}
.next-card .nc-desc{font-size:.84rem;color:var(--ink-sub);}
.next-card .nc-go{font-size:.84rem;font-weight:700;color:var(--green);white-space:nowrap;}

/* reset */
.reset-wrap{text-align:center;margin-top:28px;padding-top:24px;border-top:1px solid var(--line);}
.reset-btn{background:none;border:0;color:var(--ink-faint);font-family:inherit;font-size:.84rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.reset-btn:hover{color:var(--ink-sub);}

/* animations */
.reveal{opacity:0;transform:translateY(14px);animation:rise .65s cubic-bezier(.2,.72,.18,1) forwards;}
.reveal:nth-child(2){animation-delay:.1s;}
.reveal:nth-child(3){animation-delay:.2s;}
.reveal:nth-child(4){animation-delay:.3s;}
.reveal:nth-child(5){animation-delay:.4s;}
@keyframes rise{to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion:reduce){.reveal{animation:none;opacity:1;transform:none;}}
</style>
</head>
<body>

<div style="width:100%;border-bottom:1px solid var(--line);">
  <div class="topbar">
    <a href="index.html" class="topbar-logo">GIVE Ecosystem</a>
    <a href="index.html" class="topbar-home">홈으로 →</a>
  </div>
</div>

<div class="page">

  <div class="badge-wrap reveal">
    <div class="badge-ring" aria-hidden="true">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="54" fill="none" stroke="var(--green-soft)" stroke-width="6"/>
        <circle cx="60" cy="60" r="54" fill="none" stroke="var(--mint)" stroke-width="6"
          stroke-dasharray="339.3" stroke-dashoffset="0"
          stroke-linecap="round" transform="rotate(-90 60 60)"
          style="transition:stroke-dashoffset 1.2s cubic-bezier(.2,.72,.18,1);"/>
      </svg>
      <div class="badge-inner">
        <span class="badge-num" id="dayNum">7</span>
        <span class="badge-unit">DAY</span>
      </div>
    </div>
    <div class="badge-label">챌린지 완주</div>
    <h1 class="badge-title">7일을 해냈습니다</h1>
    <p class="badge-sub">거절하고, 선을 긋고, 나를 지키는 연습을 7일 동안 이어왔어요. 그 작은 행동들이 쌓였습니다.</p>
  </div>

  <div class="stats reveal">
    <div class="stat"><div class="num" id="statDay">7</div><div class="lbl">완주 일수</div></div>
    <div class="stat"><div class="num" id="statStart">—</div><div class="lbl">시작일</div></div>
    <div class="stat"><div class="num">100%</div><div class="lbl">달성률</div></div>
  </div>

  <div class="share-card reveal">
    <span class="sc-eyebrow">Threads 인증</span>
    <h2>이 변화를 기록으로 남겨두세요</h2>
    <p>완주 인증을 공유하면 다음 도전자에게 힘이 되고, 나에게도 기억으로 남습니다.</p>
    <div class="share-btns">
      <button class="btn-threads" id="threadsBtn">
        <img src="/images/threads-icon.webp" alt="" aria-hidden="true">
        Threads에 완주 인증하기
      </button>
      <button class="btn-share-more" id="shareMoreBtn">
        다른 방법으로 공유하기 ↗
      </button>
    </div>
  </div>

  <div class="reveal">
    <p class="next-title">다음으로 해볼 것</p>
    <div class="next-grid">
      <a href="give-test.html" class="next-card">
        <span class="itile sm" aria-hidden="true">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="4.6" r="1.3" class="fa"/><path d="M12 5.9V19"/><path d="M5 8H19"/><path d="M5 8L3.2 12H6.8Z"/><path d="M19 8L17.2 12H20.8Z" class="fa"/><path d="M9 19H15"/></svg>
        </span>
        <span class="nc-text">
          <span class="nc-title">GIVE ID 리포트</span>
          <span class="nc-desc">내 관계 패턴을 더 깊게 확인해보세요</span>
        </span>
        <span class="nc-go">보기 →</span>
      </a>
      <a href="articles/index.html" class="next-card">
        <span class="itile sm" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </span>
        <span class="nc-text">
          <span class="nc-title">심리 칼럼</span>
          <span class="nc-desc">스마트 기버로 더 성장하는 법</span>
        </span>
        <span class="nc-go">읽기 →</span>
      </a>
    </div>
  </div>

  <div class="reset-wrap reveal">
    <button class="reset-btn" id="resetBtn">챌린지를 처음부터 다시 시작하기</button>
  </div>

</div>

<script>
(function(){
  /* 상태 확인 */
  var s = giveProgress.get();
  var startDate = s.started ? s.started.split('-') : null;

  /* 시작일 표시 */
  if(startDate && startDate.length === 3){
    document.getElementById('statStart').textContent = startDate[1]+'/'+ startDate[2];
  }
  document.getElementById('dayNum').textContent = s.day || 7;
  document.getElementById('statDay').textContent = s.day || 7;

  /* 링 애니메이션 */
  var circle = document.querySelector('.badge-ring circle:last-child');
  var pct = s.isComplete ? 100 : s.percent;
  var r = 54, circ = 2*Math.PI*r;
  setTimeout(function(){
    circle.style.strokeDashoffset = String(circ*(1 - pct/100));
  }, 200);

  /* Threads 공유 — A/B 4종 순환 */
  var SHARE_VARIANTS = [
    '7일 GIVE 챌린지를 완주했습니다 🌿\n거절 연습, 경계 긋기, 나를 지키는 7일.\n\nhogoo-challenge.pages.dev\n#GIVEChallenge #스마트기버',
    '7일 동안 매일 한 가지씩 연습했어요.\n거절하고, 선 긋고, 나를 지키는 것.\n\n생각보다 쉽지 않았는데 그래서 더 남은 것 같아요.\n\nhogoo-challenge.pages.dev #GIVE챌린지',
    '"착하면 손해 본다"는 말이 자꾸 찔렸는데\n7일 챌린지 하고 나서 조금 달라진 것 같아요.\n\n혹시 나만 이런 거 아니죠?\n→ hogoo-challenge.pages.dev',
    '7일. 매일 하나. 거절 연습.\n생각보다 할 만해요.\n\nhogoo-challenge.pages.dev #GIVEChallenge'
  ];
  var shareIdx = parseInt(localStorage.getItem('give_share_variant') || '0', 10);
  var shareText = encodeURIComponent(SHARE_VARIANTS[shareIdx % SHARE_VARIANTS.length]);
  localStorage.setItem('give_share_variant', String((shareIdx + 1) % SHARE_VARIANTS.length));
  document.getElementById('threadsBtn').addEventListener('click', function(){
    window.open('https://www.threads.net/intent/post?text='+shareText,'_blank');
    if(typeof gtag==='function') gtag('event','challenge_shared',{platform:'threads'});
  });

  /* 기타 공유 */
  document.getElementById('shareMoreBtn').addEventListener('click', function(){
    var plain = decodeURIComponent(shareText);
    if(navigator.share){
      navigator.share({title:'GIVE 7일 챌린지 완주', text:plain, url:'https://hogoo-challenge.pages.dev'})
        .catch(function(){});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(plain).then(function(){
        alert('문구가 복사됐어요. SNS에 붙여넣기 해주세요!');
      });
    }
    if(typeof gtag==='function') gtag('event','challenge_shared',{platform:'other'});
  });

  /* 리셋 */
  document.getElementById('resetBtn').addEventListener('click', function(){
    if(confirm('정말 처음부터 다시 시작할까요? 지금까지의 진행 기록이 사라집니다.')){
      giveProgress.reset();
      location.href = 'hogoo-test.html';
    }
  });
})();
</script>

</body>
</html>
